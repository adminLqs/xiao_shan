# application-dev.yml - 修正后的标准YAML格式

# 服务器配置
server:
  port: 8088

# 应用配置
spring:
  # 应用名称
  application:
    name: shopping

  # ====== 数据源配置 =======
  datasource:
    url: jdbc:mysql://mysql:3306/shopping?serverTimezone=Asia/Shanghai&characterEncoding=utf8 # 数据库连接URL
    username: root # 数据库用户名
    password: 21125211323 # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL驱动类

  # ========== Redis 配置 ==========
  redis:
    host: redis        # Redis 服务器地址（默认 localhost）
    port: 6379             # Redis 端口（默认 6379）
    password:              # 密码（没有就留空）
    database: 0            # 使用哪个数据库（0-15）
    timeout: 5000ms        # 连接超时时间
    lettuce:
      pool:
        max-active: 8      # 最大活跃连接数
        max-idle: 8        # 最大空闲连接数
        min-idle: 0        # 最小空闲连接数

  # Flyway数据库版本管理
  flyway:
#    baseline-on-migrate: true # 1. 允许对已有数据的数据库进行基线化
#    baseline-version: 1 # 2. 将当前数据库状态标记为版本1
#    baseline-description: "Base migration" # 3. 基线描述
#    repair-on-migrate: true  # 添加这个配置自动修复

    enabled: true # 启用Flyway
    locations: classpath:db/migration # 迁移脚本位置

  # 文件上传配置（必须在spring下面）
  servlet:
    multipart:
      max-file-size: 10MB # 单个文件最大大小
      max-request-size: 50MB # 整个请求最大大小



# MyBatis配置
mybatis:
  mapper-locations: # Mapper XML文件位置
  type-aliases-package: com.xiaoshan.springbootdemo.entity # 实体类别名包路径，简化XML中的类型引用

  # MyBatis全局配置
  configuration:
    map-underscore-to-camel-case: true   # 开启驼峰命名自动映射：数据库字段 user_name → Java属性 userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发时显示SQL

# JWT配置
jwt:
  secret: mySuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm1234567890!

# 配置文件上传路径
app:
  file:
    upload-dir: uploads

# 日志配置
logging:
  charset:
    console: UTF-8
  level:
    com.xiaoshan.springbootdemo: DEBUG  # 添加项目日志级别

